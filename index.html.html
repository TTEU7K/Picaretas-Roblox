<!DOCTYPE html>
<HTML lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <title>Calculadora De Picaretas Roblox</title>
        <style>
            body {
                font-family: Arial;
                background: #1e1e1e;
                color: white;
                text-align: center;
            }
            .container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }    
            .picareta {
                background: #DFCEA7;
                border-radius: 12px;
                padding: 10px;
                transition: 0.2s;
                box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            }
            .picareta:hover{
                transform: scale(1.05);
                
            }
            .picareta img {
                width: 100px;
                height: 100px;
                cursor: pointer;
            }
            .picareta img.active {
                transform: scale(0.9);
            }
            .nome{
                margin-top: 5px;
                font-weight: bold;
            }
            input {
                width: 60px;
                margin-top: 5px;
                text-align: center;
                border-radius: 5px;
                border: none;
                padding: 3px;
                font-weight: bold;
            }
            button {
                margin-top: 20px;
                padding: 10px;
                font-size: 16px;
            }
            .controle {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                margin-top: 8px;
            }
            button {
                border: none;
                padding: 6px 10px;
                font-size: 16px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }
            .mais {
                background: #2ecc71;
                color: white;
            }
            .menos {
                background: #e74c3c;
                color: white;
            }
            span {
                min-width: 25px;
                display: inline-block;
                font-size: 18px;
            }
        </style>
    </head>
    <body>
        <h2>Calculadora de Picaretas Roblox</h2>
        <label>Nível desejado:</label>
        <input type="Number" id="nivel" value="5" min="1" max="13">
        <div class="container" id="grid"></div>
        <button onclick="calcular()">Calcular</button>
        <h2 id="resultado"></h2>
        <script>
            const dados = [
                {nome:"Madeira", valor:1, img:"madeira.png"},
                {nome:"Pedra", valor:3, img:"pedra.png"},
                {nome:"Cobre", valor:9, img:"cobre.png"},
                {nome:"Ferro", valor:27, img:"ferro.png"},
                {nome:"Titânio", valor:81, img:"titanio.png"},
                {nome:"Tungstênio", valor:243, img:"tungstenio.png"},
                {nome:"Cristal", valor:729, img:"cristal.png"},
                {nome:"Obsidiana", valor:2187, img:"obsidiana.png"},
                {nome:"Esmeralda", valor:6561, img:"esmeralda.png"},
                {nome:"Safira", valor:19683, img:"safira.png"},
                {nome:"Rubi", valor:59049, img:"rubi.png"},
                {nome:"Carbono", valor:177147, img:"carbono.png"},
                {nome:"Diamante", valor:531441, img:"diamante.png"},
                {nome:"Derretido", valor:1594323, img:"derretido.png"}
            ];
            const grid = document.getElementById("grid");
            dados.forEach((p, i) => {
                grid.innerHTML += `
                <div class="picareta">
                    <img src="${p.img}" alt="${p.nome}" onclick="alterar(${i}, 1)">
                    
                    <div class="nome">${p.nome}</div>

                    <div class="controle">
                        <button class="menos" onclick="alterar(${i}, -1)">-</button>

                        <span id="q${i}">0</span>

                        <button class="mais" onclick="alterar(${i}, 1)">+</button>
                    </div>
                </div>
                `;
                
            });
            function alterar(i, valor) {
                let span = document.getElementById("q" + i);
                let atual = Number(span.innerText);

                atual += valor;

                if (atual < 0) atual = 0;

                span.innerText = atual;
            }

            function calcular() {
                const nivel = document.getElementById("nivel").value;
                const custo = dados[nivel - 1].valor;
                let total = 0;
                for (let i = 0; i< dados.length; i++) {
                    let qtd = Number(document.getElementById("q" + i).innerText);
                    total += qtd * dados[i].valor;
                }
                let falta = custo - total;
                document.getElementById("resultado").innerText = 
                    falta > 0
                    ? "Faltam " + falta + " picaretas base"
                    : "Você já pode subir de nível!";
            }

        </script>
    </body>
</HTML>
